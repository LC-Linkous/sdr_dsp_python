# sdr_dsp

A personal, fully-functional DSP library for software-defined radio, written in
Python. It consumes IQ samples — from a file or, later, a live SDR — and turns
them into meaning: filtered channels, spectra, demodulated audio, decoded
signals.

It is a **library, not a framework.** You import functions and classes and
orchestrate the pipeline yourself in plain Python. There is no runtime,
scheduler, flowgraph engine, or GUI. It is not a GNU Radio competitor — GNU
Radio remains the right tool for large real-time flowgraphs; `sdr_dsp` is for
direct, scriptable DSP in Python.

## Design philosophy

**The radio DSP is the library's own code.** Filtering (application),
demodulation, resampling, mixing, and measurement are implemented here.
`scipy.signal` is used only to *design* filter coefficients (the solved, hard,
stable math), `numpy.fft` provides the FFT, and scipy also serves as a **test
oracle** — the library's own implementations are verified against scipy's
known-good results. scipy is a design-time tool, not a runtime crutch.

**Device-agnostic by structure.** The core DSP operates on `complex64` arrays
and knows nothing about any device. IQ arrives through a *source* that satisfies
the `IQSource` protocol — `ArraySource` and `FileSource` ship with the library
(no device dependency); a device source lives in *your* application/example code
(see `examples/hackrf_capture.py` for a HackRF reference). The library provides
the hooks and the protocol; you provide the hardware. Pointing a different SDR
at it is a small adapter in your own code, not a library change.

