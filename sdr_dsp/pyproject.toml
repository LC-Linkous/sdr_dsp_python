```

## Setup and use

This project uses [uv](https://docs.astral.sh/uv/). From the project directory
(the one containing `pyproject.toml`):

```bash
uv sync                  # create the venv, install numpy + scipy + dev tools
uv run pytest -q         # run the test suite (expect: 34 passed)
uv build                 # build the wheel + sdist into dist/
```

The library installs on **numpy + scipy alone** — no SDR hardware or device
library required. Everything works on files.

Optional extras:

```bash
uv sync --extra plotting   # matplotlib, for the analyzer/spectrogram examples
uv sync --extra audio      # sounddevice, for live audio playback
```

### Library dependencies

The **library** depends only on **numpy + scipy**. It installs and runs with no
SDR hardware or device library. Everything in `src/sdr_dsp/` works on arrays and
files alone.

